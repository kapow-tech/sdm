syntax = "proto3";

package sdm;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/kapow-tech/sdm/sdmprotos";

extend google.protobuf.FieldOptions {
  bool primary_key = 50000;
  bool chain_identifier_key = 50001;
  bool pii = 50002;
  bool query_index = 50003;
  bool hashed = 50004;
  bool unique = 50005;
  string references = 50006; // FK annotation, format "MessageName.field_name" e.g. "Organisation.id"
  bool auto_increment = 50007; // generates BIGSERIAL in SQL and autoIncrement GORM tag
  bool json = 50008; // string field stored as Postgres JSONB and Go datatypes.JSON
}
